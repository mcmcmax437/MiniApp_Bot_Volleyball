name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          VPS_APP_DIR: /usr/src/volleyball_miniApp/MiniApp_Bot_Volleyball
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_SSH_KEY" ]; then
            echo "Missing GitHub secrets: VPS_HOST, VPS_USER, VPS_SSH_PRIVATE_KEY"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/deploy_key \
            "${VPS_USER}@${VPS_HOST}" \
            "VPS_APP_DIR='${VPS_APP_DIR}' VPS_REPO_URL='https://github.com/mcmcmax437/MiniApp_Bot_Volleyball.git' bash -s" <<'REMOTE'
          set -eo pipefail
          APP_DIR="$VPS_APP_DIR"
          VPS_USER="${VPS_USER:-root}"

          # If the repo is not yet cloned (or the existing directory is not a
          # valid git checkout, e.g. just a placeholder), run the bootstrap
          # (clone + first build). Also bootstrap if scripts/vps-update.sh
          # is missing — that means the directory is a stale clone from before
          # the deploy pipeline was added.
          NEEDS_BOOTSTRAP=true
          if [[ -d "$APP_DIR/.git" ]] \
             && git -C "$APP_DIR" rev-parse --git-dir >/dev/null 2>&1 \
             && [[ -x "$APP_DIR/scripts/vps-update.sh" ]]; then
            NEEDS_BOOTSTRAP=false
          fi

          if [[ "$NEEDS_BOOTSTRAP" == "true" ]]; then
            echo "==> $APP_DIR is not a valid git checkout, running vps-git-bootstrap.sh"
            mkdir -p "$(dirname "$APP_DIR")"

            # Fetch the bootstrap script from GitHub (raw) and run it.
            curl -fsSL https://raw.githubusercontent.com/mcmcmax437/MiniApp_Bot_Volleyball/main/scripts/vps-git-bootstrap.sh \
              -o /tmp/vps-git-bootstrap.sh
            bash /tmp/vps-git-bootstrap.sh
            exit 0
          fi

          cd "$APP_DIR"
          chmod +x scripts/vps-update.sh
          bash scripts/vps-update.sh
          REMOTE