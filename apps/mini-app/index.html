<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="description" content="VolleyBot — find and organize volleyball games in your city" />
    <title>VolleyBot — find volleyball games near you</title>

    <!-- Preconnect to required origins (cuts handshake time) -->
    <link rel="preconnect" href="https://use.hugeicons.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />

    <!-- Hugeicons Stroke Rounded (UI icons).
         IMPORTANT: no `crossorigin` attribute here. The icons.css endpoint
         doesn't return CORS headers, so crossorigin="anonymous" would cause
         the browser to silently drop the response → no icons render. -->
    <link
      rel="stylesheet"
      href="https://use.hugeicons.com/font/icons.css"
    />

    <!-- Google Fonts: Outfit (display) + Inter (body) + JetBrains Mono (numeric).
         Google Fonts DOES return proper CORS headers, so crossorigin is fine. -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&family=Outfit:wght@500;600;700;800&display=swap"
      crossorigin="anonymous"
    />

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
