services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: volley_root
      MYSQL_DATABASE: volleyball
      MYSQL_USER: volley
      MYSQL_PASSWORD: volley
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pvolley_root"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "3306:3306"

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: mysql://volley:volley@mysql:3306/volleyball
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30d}
      BOT_TOKEN: ${BOT_TOKEN}
      WEBAPP_URL: ${WEBAPP_URL}
      DEFAULT_CITY: ${DEFAULT_CITY:-Kyiv}
      DEFAULT_CITY_LAT: ${DEFAULT_CITY_LAT:-50.4501}
      DEFAULT_CITY_LNG: ${DEFAULT_CITY_LNG:-30.5234}
      CORS_ORIGINS: ${CORS_ORIGINS}
    restart: unless-stopped
    ports:
      - "3000:3000"

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-/api}
    ports:
      - "8080:80"

volumes:
  mysql_data:
